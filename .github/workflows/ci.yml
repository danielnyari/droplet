name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # droplet-py links libpython (pyo3 without the deprecated extension-module
      # feature), so the build needs a Python available to link against.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Cache the cargo registry + target dir so the bundled DuckDB C++ engine (slow, minutes)
      # is reused across runs instead of recompiled every time.
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
      # The DuckDB local analyze engine is behind an opt-in feature, so the default steps above
      # never exercise it. Cover it explicitly (M1). First run compiles bundled DuckDB (~3 min);
      # the rust-cache above makes later runs fast.
      - run: cargo clippy -p droplet-core --all-targets --features duckdb -- -D warnings
      - run: cargo test -p droplet-core --features duckdb
